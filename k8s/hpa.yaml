apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: food-backend-hpa
  namespace: food-system
  labels:
    app.kubernetes.io/name: food-backend-hpa
    app.kubernetes.io/part-of: food-ordering
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: food-backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 120

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: food-frontend-hpa
  namespace: food-system
  labels:
    app.kubernetes.io/name: food-frontend-hpa
    app.kubernetes.io/part-of: food-ordering
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: food-frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
