apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-backend
  namespace: food-system
  # Warning Fix: เพิ่ม recommended Kubernetes labels
  labels:
    app.kubernetes.io/name: food-backend
    app.kubernetes.io/part-of: food-ordering
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 2
  selector:
    matchLabels:
      app: food-backend
  template:
    metadata:
      labels:
        app: food-backend
        app.kubernetes.io/name: food-backend
        app.kubernetes.io/part-of: food-ordering
      # Warning Fix: เพิ่ม annotations ให้ Prometheus auto-discover pod นี้
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      # Warning Fix: Security Context ระดับ Pod — บังคับให้ run as non-root
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
      - name: food-backend
        # Warning Fix: ใช้ versioned tag ไม่ใช้ latest — เปลี่ยน tag ด้วย kubectl set image ใน Jenkinsfile
        image: gowitphooang/food-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        # Warning Fix: Security Context ระดับ Container
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        # Warning Fix: เพิ่ม Resource Limits/Requests — ป้องกัน Pod กิน resource ทั้ง Node
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        # Warning Fix: เพิ่ม readinessProbe — K8s รอ Pod พร้อมก่อนส่ง traffic
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: food-backend-svc
  namespace: food-system
  labels:
    app.kubernetes.io/name: food-backend
    app.kubernetes.io/part-of: food-ordering
spec:
  selector:
    app: food-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP
